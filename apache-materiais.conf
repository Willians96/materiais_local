<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /home/materiais/app

    <Directory /home/materiais/app>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Sistema legado usa BASE_PATH=/new/ — cria alias pra URLs funcionarem
    Alias /new /home/materiais/app

    ErrorLog ${APACHE_LOG_DIR}/materiais-error.log
    CustomLog ${APACHE_LOG_DIR}/materiais-access.log combined

    php_admin_value upload_max_filesize 50M
    php_admin_value post_max_size 50M
    php_admin_value memory_limit 256M
</VirtualHost>
